<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Love Message 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2em;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border 0.3s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .file-upload {
      border: 3px dashed #667eea;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #f8f9ff;
    }
    .file-upload:hover {
      background: #eef0ff;
      transform: translateY(-2px);
    }
    .file-upload input {
      display: none;
    }
    .upload-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .preview {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 10px;
      display: none;
    }
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .loader {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .result {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: #f0fff4;
      border: 2px solid #48bb78;
      border-radius: 10px;
    }
    .result h3 {
      color: #48bb78;
      margin-bottom: 10px;
    }
    .link-box {
      background: white;
      padding: 15px;
      border-radius: 8px;
      word-break: break-all;
      margin: 10px 0;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #ddd;
    }
    .copy-btn {
      background: #48bb78;
      margin-top: 10px;
    }
    .hidden { display: none; }
    
    /* Page 2 & 3 Styles */
    .question-page, .success-page {
      text-align: center;
    }
    .question-text {
      font-size: 1.5em;
      color: #333;
      margin: 30px 0;
      font-weight: 600;
    }
    .love-image {
      max-width: 100%;
      border-radius: 15px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .yes-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 20px 60px;
      font-size: 24px;
    }
    .no-btn {
      background: #cbd5e0;
      padding: 20px 60px;
      font-size: 24px;
    }
    .no-btn:hover {
      background: #a0aec0;
    }
    .message {
      margin: 20px 0;
      padding: 15px;
      background: #fff5f5;
      border-left: 4px solid #fc8181;
      border-radius: 5px;
      display: none;
      color: #c53030;
    }
    .heart {
      font-size: 80px;
      animation: heartbeat 1.5s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .success-text {
      font-size: 1.3em;
      color: #333;
      margin: 20px 0;
      line-height: 1.6;
    }
    .sender-name {
      color: #667eea;
      font-weight: bold;
      font-size: 1.2em;
    }
  </style>
</head>
<body>

  <!-- PAGE 1: Creator -->
  <div id="page1" class="container">
    <h1>💕 Love Message Creator</h1>
    <p class="subtitle">Create a special message for your loved one</p>
    
    <form id="loveForm">
      <div class="form-group">
        <label>💝 Lover's Name:</label>
        <input type="text" id="loverName" required placeholder="Enter their name">
      </div>
      
      <div class="form-group">
        <label>✍️ Your Name:</label>
        <input type="text" id="senderName" required placeholder="Enter your name">
      </div>
      
      <div class="form-group">
        <label>💬 Your Question:</label>
        <input type="text" id="question" required placeholder="e.g., Will you be my Valentine?">
      </div>
      
      <div class="form-group">
        <label>📷 Upload Photo:</label>
        <label class="file-upload" for="imageInput">
          <input type="file" id="imageInput" accept="image/*" required>
          <div class="upload-icon">📁</div>
          <div>Click to choose a photo</div>
          <img id="imagePreview" class="preview" alt="Preview">
        </label>
      </div>
      
      <button type="submit" class="btn" id="createBtn">✨ Create Magic Link</button>
      
      <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Creating your link...</p>
      </div>
    </form>
    
    <div class="result" id="result">
      <h3>✅ Your Link is Ready!</h3>
      <p>Share this link with your special someone:</p>
      <div class="link-box" id="linkBox"></div>
      <button class="btn copy-btn" onclick="copyLink()">📋 Copy Link</button>
      <button class="btn" style="margin-top: 10px; background: #667eea;" onclick="location.reload()">➕ Create Another</button>
    </div>
  </div>

  <!-- PAGE 2: Question -->
  <div id="page2" class="container question-page hidden">
    <h1>💌 A Special Question</h1>
    <div class="question-text" id="displayQuestion"></div>
    <img id="displayImage" class="love-image" style="display: none;">
    <div class="message" id="noMessage"></div>
    <div class="buttons">
      <button class="btn yes-btn" onclick="sayYes()">Yes! ❤️</button>
      <button class="btn no-btn" id="noBtn" onclick="sayNo()">No 💔</button>
    </div>
  </div>

  <!-- PAGE 3: Success -->
  <div id="page3" class="container success-page hidden">
    <div class="heart">❤️</div>
    <h1 style="margin-top: 20px;">Yay! You Said Yes!</h1>
    <div class="success-text" id="successMessage"></div>
    <img id="successImage" class="love-image" style="display: none;">
    <p style="margin-top: 30px; color: #666;">
      With all my love,<br>
      <span class="sender-name" id="displaySender"></span>
    </p>
  </div>

  <script>
    // Check if there's a link in the URL
    window.onload = function() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          const data = JSON.parse(atob(hash));
          showQuestionPage(data);
        } catch(e) {
          console.log('Invalid link');
        }
      }
    };

    // Image preview
    document.getElementById('imageInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const preview = document.getElementById('imagePreview');
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // Form submission
    document.getElementById('loveForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('createBtn');
      const loader = document.getElementById('loader');
      const fileInput = document.getElementById('imageInput');
      
      btn.disabled = true;
      loader.style.display = 'block';
      
      try {
        // Upload image to ImgBB
        const imageUrl = await uploadImage(fileInput.files[0]);
        
        // Prepare data
        const data = {
          lover: document.getElementById('loverName').value,
          sender: document.getElementById('senderName').value,
          question: document.getElementById('question').value,
          image: imageUrl
        };
        
        // Create short link
        const encoded = btoa(JSON.stringify(data));
        const baseUrl = window.location.origin + window.location.pathname;
        const shortLink = `${baseUrl}#${encoded}`;
        
        // Show result
        document.getElementById('linkBox').textContent = shortLink;
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        
      } catch (error) {
        alert('Error creating link. Please try again.');
        console.error(error);
      } finally {
        btn.disabled = false;
        loader.style.display = 'none';
      }
    });

    // Upload to ImgBB (Free API)
    async function uploadImage(file) {
      const formData = new FormData();
      formData.append('image', file);
      
      const response = await fetch('https://api.imgbb.com/1/upload', {
        method: 'POST',
        body: formData
      });
      
      const data = await response.json();
      if (data.success) {
        return data.data.url;
      }
      throw new Error('Upload failed');
    }

    function copyLink() {
      const link = document.getElementById('linkBox').textContent;
      navigator.clipboard.writeText(link).then(() => {
        alert('Link copied! Share it with your love! 💕');
      });
    }

    function showQuestionPage(data) {
      document.getElementById('page1').classList.add('hidden');
      document.getElementById('page2').classList.remove('hidden');
      
      document.getElementById('displayQuestion').textContent = 
        `Dear ${data.lover}, ${data.question}`;
      
      if (data.image) {
        const img = document.getElementById('displayImage');
        img.src = data.image;
        img.style.display = 'block';
      }
      
      // Store data for yes button
      window.currentData = data;
    }

    let noCount = 0;
    const noMessages = [
      "Please... there's nothing in No 😢",
      "Are you sure? Think again! 💭",
      "My heart is breaking... say Yes! 💔",
      "Just one little Yes? Pretty please! 🥺",
      "I won't take No for an answer! 😊",
      "Yes is the only right answer! ❤️"
    ];

    function sayNo() {
      const msgBox = document.getElementById('noMessage');
      msgBox.textContent = noMessages[noCount % noMessages.length];
      msgBox.style.display = 'block';
      noCount++;
      
      // Move the No button randomly
      const btn = document.getElementById('noBtn');
      const x = (Math.random() - 0.5) * 200;
      const y = (Math.random() - 0.5) * 100;
      btn.style.transform = `translate(${x}px, ${y}px)`;
      
      setTimeout(() => {
        btn.style.transform = 'translate(0, 0)';
      }, 1000);
    }

    function sayYes() {
      const data = window.currentData;
      document.getElementById('page2').classList.add('hidden');
      document.getElementById('page3').classList.remove('hidden');
      
      document.getElementById('successMessage').innerHTML = 
        `Dear ${data.lover}, you just made me the happiest person in the world! ` +
        `I love you more than words can express. You mean everything to me! 💕✨`;
      
      if (data.image) {
        const img = document.getElementById('successImage');
        img.src = data.image;
        img.style.display = 'block';
      }
      
      document.getElementById('displaySender').textContent = data.sender;
      
      // Confetti effect
      createConfetti();
    }

    function createConfetti() {
      const colors = ['#f093fb', '#f5576c', '#4facfe', '#43e97b', '#fa709a'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.style.position = 'fixed';
          confetti.style.width = '10px';
          confetti.style.height = '10px';
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.top = '-10px';
          confetti.style.borderRadius = '50%';
          confetti.style.zIndex = '9999';
          confetti.style.pointerEvents = 'none';
          document.body.appendChild(confetti);
          
          const duration = Math.random() * 3 + 2;
          confetti.animate([
            { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
            { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
          ], {
            duration: duration * 1000,
            easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
          }).onfinish = () => confetti.remove();
        }, i * 50);
      }
    }
  </script>
</body>
</html>
